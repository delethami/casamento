<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Del & Thami — 10.10.2027</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --wine: #7a1e2e;
    --wine-light: #c4a89a;
    --wine-pale: #f0e8e4;
    --cream: #f5f3e8;
    --stone: #e0d9cc;
    --text-dark: #1a1210;
    --text-mid: #2e2420;
    --text-light: #4a3c36;
    --ivory: #faf8f2;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Jost', sans-serif; background: var(--ivory); color: var(--text-dark); font-weight: 300; overflow-x: hidden; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(250,248,242,0.95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--stone); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 500; color: var(--wine); letter-spacing: 0.05em; white-space: nowrap; }
  .nav-links { display: flex; gap: 1.5rem; list-style: none; align-items: center; }
  .nav-links a { font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--wine); text-decoration: none; transition: all 0.2s; font-weight: 600; white-space: nowrap; border: 1.5px solid var(--wine); border-radius: 3px; padding: 0.3rem 0.7rem; }
  .nav-links a:hover { background: var(--wine); color: white; }
  .nav-hamburger { display: none; background: none; border: none; cursor: pointer; padding: 0.5rem; flex-direction: column; gap: 5px; }
  .nav-hamburger span { display: block; width: 24px; height: 1.5px; background: var(--wine); transition: all 0.3s; }
  .nav-hamburger.aberto span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
  .nav-hamburger.aberto span:nth-child(2) { opacity: 0; }
  .nav-hamburger.aberto span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
  .nav-mobile { display: none; position: fixed; top: 60px; left: 0; right: 0; background: rgba(250,248,242,0.98); border-bottom: 1px solid var(--stone); z-index: 99; padding: 1.5rem 2rem; flex-direction: column; gap: 1.2rem; }
  .nav-mobile.aberto { display: flex; }
  .nav-mobile a { font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--wine); text-decoration: none; font-weight: 600; border: 1.5px solid var(--wine); border-radius: 3px; padding: 0.4rem 0.8rem; display: inline-block; }
  .nav-mobile a:hover { background: var(--wine); color: white; }
  @media (max-width: 768px) { .nav-links { display: none; } .nav-hamburger { display: flex; } }

  .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 80px 2rem 4rem; position: relative; background: var(--cream); overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: -40px; left: -40px; width: 320px; height: 320px; border-radius: 50%; background: var(--wine-pale); opacity: 0.6; }
  .hero::after { content: ''; position: absolute; bottom: -60px; right: -60px; width: 400px; height: 400px; border-radius: 50%; background: var(--wine-pale); opacity: 0.4; }
  .hero-inner { position: relative; z-index: 1; }
  .hero-eyebrow { font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--wine); margin-bottom: 1.5rem; }
  .hero-names { font-family: 'Cormorant Garamond', serif; font-size: clamp(4rem, 12vw, 8rem); font-weight: 300; line-height: 1.1; color: var(--wine); margin-bottom: 1.5rem; }
  .hero-amp { display: block; font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 300; color: var(--wine-light); margin: 0.2rem 0; }
  .hero-divider { width: 60px; height: 1px; background: var(--wine-light); margin: 2rem auto; }
  .hero-date { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 300; letter-spacing: 0.15em; color: var(--text-mid); margin-bottom: 0.5rem; }
  .hero-location { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-light); margin-bottom: 0.5rem; }
  .countdown { display: flex; gap: 1.5rem; justify-content: center; margin-top: 2.5rem; align-items: center; }
  .countdown-unit { text-align: center; border: 1.5px solid var(--wine); border-radius: 3px; padding: 0.6rem 1rem; }
  .countdown-num { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 300; color: var(--wine); display: block; line-height: 1; }
  .countdown-label { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--wine); margin-top: 0.3rem; display: block; }
  .countdown-sep { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--wine-light); }
  @media (max-width: 600px) { .hero-date { font-size: 1.8rem; } .countdown-num { font-size: 1.8rem; } .countdown { gap: 0.8rem; } }

  section { padding: 6rem 2rem; max-width: 900px; margin: 0 auto; }
  .section-label { font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--wine); margin-bottom: 1rem; display: block; font-weight: 400; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 300; color: var(--wine); margin-bottom: 2.5rem; line-height: 1.2; }
  .section-divider { width: 40px; height: 1px; background: var(--wine-light); margin: 0 0 2.5rem; }

  .timeline { position: relative; padding-left: 2rem; border-left: 1px solid var(--wine-light); }
  .timeline-item { margin-bottom: 2.5rem; position: relative; }
  .timeline-item::before { content: ''; position: absolute; left: -2.37rem; top: 0.35rem; width: 8px; height: 8px; border-radius: 50%; background: var(--wine); border: 2px solid var(--ivory); outline: 1px solid var(--wine-light); }
  .timeline-year { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--wine); margin-bottom: 0.4rem; font-weight: 400; }
  .timeline-text { font-size: 1rem; line-height: 1.8; color: var(--text-mid); }

  .event-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; }
  .event-card { background: var(--ivory); border: 1px solid var(--stone); border-radius: 4px; padding: 1.5rem; text-align: center; }
  .event-icon { font-size: 1.1rem; color: var(--wine-light); margin-bottom: 0.6rem; display: block; }
  .event-card-label { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-light); margin-bottom: 0.6rem; display: block; font-weight: 400; }
  .event-card-value { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; color: var(--wine); line-height: 1.2; }
  .event-card-note { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-light); line-height: 1.6; margin-top: 0.6rem; font-weight: 400; }

  /* PRESENTES */
  .gifts-intro { font-size: 1rem; line-height: 1.9; color: var(--text-mid); margin-bottom: 2.5rem; max-width: 560px; }
  .gifts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }
  .gift-card { background: var(--ivory); border: 1px solid var(--stone); border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; transition: border-color 0.2s; }
  .gift-card:hover { border-color: var(--wine-light); }
  .gift-img-wrap { width: 100%; height: 160px; background: var(--cream); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .gift-img-placeholder { font-size: 2.5rem; color: var(--wine-light); }
  .gift-overlay { position: absolute; inset: 0; background: rgba(44,20,16,0.55); display: none; align-items: center; justify-content: center; }
  .gift-overlay-text { color: white; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 500; }
  .gift-body { padding: 1rem; flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
  .gift-name { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 400; color: var(--text-dark); }
  .gift-price { font-size: 0.85rem; color: var(--wine); font-weight: 500; letter-spacing: 0.05em; }
  .gift-btn { margin-top: auto; padding-top: 0.8rem; }
  .btn-comprar { width: 100%; background: var(--wine); color: white; border: none; padding: 0.7rem; font-family: 'Jost', sans-serif; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; border-radius: 3px; transition: background 0.2s; }
  .btn-comprar:hover { background: #6a1828; }
